<!DOCTYPE html>
<html>
<head>
    <title>Not-An-AI Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 70%; line-height: 1.4; }
        .user { align-self: flex-end; background: #007bff; }
        .bot { align-self: flex-start; background: #333; }
        .input-area { padding: 20px; background: #1e1e1e; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg bot">Yo! I'm the Not-An-AI bot. What's the word?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>

<script>
    let userName = "";
    const slangMap = { "u": "you", "r": "are", "idk": "i don't know", "im": "i am", "wat": "what" };
    const excuses = [
        "Gang I'm not a AI, so idrk...",
        "You're asking the wrong guy, I'm just a script.",
        "That's way too deep for my code, chill.",
        "I'm just a simple bot, I don't do science."
    ];

    function send() {
        let inputField = document.getElementById("userInput");
        let rawText = inputField.value.trim();
        if (!rawText) return;

        addMsg(rawText, 'user');
        inputField.value = "";

        // Normalize text
        let cleanText = rawText.toLowerCase().split(' ').map(w => slangMap[w] || w).join(' ');

        // Bot Logic
        setTimeout(() => {
            let reply = "Ok buddy... anyway, what else?";

            if (cleanText.match(/atoms|physics|math|why|space|meaning|exist/)) {
                reply = excuses[Math.floor(Math.random() * excuses.length)];
            } else if (cleanText.includes("what can you do")) {
                reply = "I cannot help you with anything."
            } else if (cleanText.includes("my name is")) {
                userName = rawText.split("is").pop().trim();
                reply = `Bet. I'll remember that, ${userName}.`;
            } else if (cleanText.includes("what") && cleanText.includes("my name")) {
                reply = userName ? `Your name is ${userName}. Did you forget?` : "You haven't told me your name yet, gang.";
            } else if (cleanText.includes("how") && cleanText.includes("you")) {
                reply = `I'm chilling${userName ? ', ' + userName : ''}. Just living on GitHub. You?`;
            } else if (cleanText.includes("hello") || cleanText.includes("hi")) {
                reply = "Yo! What's up?";
            }

            addMsg(reply, 'bot');
        }, 600);
    }

    function addMsg(text, sender) {
        let div = document.createElement("div");
        div.className = "msg " + sender;
        div.innerText = text;
        document.getElementById("chat-box").appendChild(div);
        document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
    }
</script>
</body>
</html>
